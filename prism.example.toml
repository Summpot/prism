#:schema https://raw.githubusercontent.com/Summpot/prism/master/prism.schema.json
admin_addr = ":8080"
proxy_protocol_v2 = false
buffer_size = 32768
upstream_dial_timeout_ms = 5000
max_header_bytes = 65536

# role = "standalone" # standalone | management | worker

# Management-only bootstrap example. A management node can omit listeners/routes/tunnel
# entirely and just run the control plane + panel API.
# role = "management"
# [managed.management]
# state_file = "managed-state.json"
# panel_token = "panel-secret"
# worker_token = "worker-secret"

# Worker bootstrap example. Managed workers keep only bootstrap identity/agent
# settings locally; desired runtime config is synced from the management node.
# role = "worker"
# [managed.worker]
# node_id = "edge-1"
# management_url = "http://127.0.0.1:8080"
# auth_token = "worker-secret"
# connection_mode = "active" # active | passive
# sync_interval_ms = 5000
# agent_url = "http://10.0.0.12:8081"

# Public-facing proxy listeners (multi-port / multi-protocol).
#
# TCP listeners can run in hostname-routing mode (host extraction via wasm middlewares)
# or in fixed forwarding mode.
# UDP listeners run in fixed forwarding mode.

[[listeners]]
listen_addr = ":25565"
protocol = "tcp"

# If upstream is omitted for a TCP listener, Prism uses hostname routing.
# If upstream is set, Prism forwards to that fixed upstream.

# Example UDP game port forwarding (direct):
[[listeners]]
listen_addr = ":19132"
protocol = "udp"
upstream = "127.0.0.1:19132"

[tunnel]
auth_token = ""

# When true, prisms will automatically open server-side listeners for tunnel
# services that specify remote_addr (frp-like behavior).
auto_listen_services = true

# Configure one or more tunnel endpoints. Multiple endpoints allow serving
# multiple transports at the same time (similar to frp's server).

[[tunnel.endpoints]]
listen_addr = ":7000"
transport = "tcp" # tcp | udp | quic

[[tunnel.endpoints]]
listen_addr = ":7001"
transport = "quic"

[tunnel.endpoints.quic]
# If transport=quic and cert/key are empty, prism will generate a self-signed
# certificate at startup.
cert_file = ""
key_file = ""

# Optional: tunnel client role (uncomment to enable).
#
# [tunnel.client]
# server_addr = "127.0.0.1:7000"
# transport = "tcp" # tcp | udp | quic
# dial_timeout_ms = 5000
#
# [tunnel.client.quic]
# server_name = "localhost"
# insecure_skip_verify = true
#
# [[tunnel.services]]
# name = "home-mc"
# proto = "tcp" # tcp | udp
# local_addr = "127.0.0.1:25565"
# route_only = true # optional. If true, only reachable via routes (tunnel:home-mc).
# remote_addr = ":25565" # optional (frp-like). If set, prisms opens this listener automatically.
# masquerade_host = "" # advanced. If set, rewrite middlewares use this host when routing to tunnel:home-mc.
# # Leave empty for normal Minecraft tunnel routing to preserve the client's handshake host.
# # Supports $1, $2... substitutions from route wildcard capture groups.

[logging]
level = "info"
format = "json"
output = "stderr"
add_source = false

[reload]
enabled = true
poll_interval_ms = 1000

# Each route must specify one or more routing middlewares (by name).
# Middlewares are loaded from "<config_dir>/middlewares/<name>.wat" by default.
# Prism will also materialize a few default/reference middlewares into that directory on startup
# (only if the files do not already exist).

[timeouts]
handshake_timeout_ms = 3000
idle_timeout_ms = 0

[[routes]]
host = "play.example.com"
upstream = "127.0.0.1:25566"
middlewares = ["minecraft_handshake"]

# Wildcards ('*' and '?') support capture groups that can be substituted into upstreams
# using $1, $2, ...
[[routes]]
host = "*.labs.example.com"
upstreams = ["127.0.0.1:25567", "127.0.0.1:25568"]
strategy = "round-robin"
middlewares = ["minecraft_handshake"]

[[routes]]
host = "home.example.com"
upstream = "tunnel:home-mc"
middlewares = ["minecraft_handshake"]
