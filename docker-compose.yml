services:
  prism:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PRISM_CONFIG: /etc/prism/prism.toml
    volumes:
      - ./deploy/prism/prism.toml:/etc/prism/prism.toml:ro
    ports:
      - "8080:8080" # admin plane + frontend
      - "7000:7000" # tunnel endpoint
